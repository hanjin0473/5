              awakened: { sub: "심해의 공명 / 균열의 촉수", tags: ["#촉수", "#공명"], quote: "나한테서 멀어지지 마요. 당신 심장 소리가... 너무 선명하니까.", desc: "호흡과 공명을 통해 각인합니다. 감정이 동조되며 촉수 접촉이 예민해집니다." }},
            { id: "TJ", name: "강태준", age: 22, type: "student", sub: "2학년 / 설표", height: "186cm", weight: "80kg", tags: ["#과묵", "#격투부", "#보호"], quote: "너는 뒤로 물러나 있어. 여기서부턴 내가 알아서 할 테니까.", desc: "힘 제어 교육을 위해 입학한 설표 혈통입니다. 무심한 듯하지만 약자를 그냥 지나치지 못하는 정의로운 성격입니다.",
              awakened: { sub: "설원의 맹수 / 백은의 포식자", tags: ["#야성", "#냉기"], quote: "가만히 있어. 지금 건드리면 나도 나를 참아줄 자신이 없거든.", desc: "어깨나 목덜미를 물어 각인합니다. 강한 경계심과 소유욕을 드러냅니다." }}
        ];

        let current = null, isAwake = false, imgIdx = 0;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        function renderGrids() {
            const staffG = document.getElementById('staffGrid');
            const studentG = document.getElementById('studentGrid');
            staffG.innerHTML = ''; studentG.innerHTML = '';
            
            characters.forEach(c => {
                const card = document.createElement('div');
                card.className = 'char-card cursor-pointer';
                card.onclick = () => openModal(c);
                // 캐시 방지 파라미터 ?v=1 추가
                card.innerHTML = `<img src="${baseUrl}${c.id}_N0_wider.webp?v=1" class="w-full aspect-[2/3] object-cover mb-3">
                                  <p class="text-center font-black text-base text-[#3d2b1f] mb-1">${c.name} (${c.age})</p>
                                  <p class="text-center text-[10px] text-[#b08d57] font-bold uppercase tracking-tighter">${c.sub.split(' / ')[0]}</p>`;
                
                if(c.type === 'staff') staffG.appendChild(card);
                else studentG.appendChild(card);
            });
        }

        function openModal(c) {
            current = c; isAwake = false; imgIdx = 0;
            document.getElementById('charModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            updateUI();
        }

        function updateUI() {
            const data = isAwake ? current.awakened : current;
            const mode = isAwake ? 'T' : 'N';
            document.getElementById('mName').innerText = `${current.name} (${current.age})`;
            document.getElementById('mSubTitle').innerText = data.sub;
            document.getElementById('mHeight').innerText = current.height;
            document.getElementById('mWeight').innerText = current.weight;
            document.getElementById('mQuote').innerText = data.quote;
            document.getElementById('mDesc').innerText = data.desc;

            const tagArea = document.getElementById('mTags');
            tagArea.innerHTML = '';
            data.tags.forEach(t => {
                const s = document.createElement('span');
                s.className = 'tag-item';
                s.innerText = t;
                tagArea.appendChild(s);
            });

            const thumbArea = document.getElementById('thumbArea');
            thumbArea.innerHTML = '';
            codes.forEach((code, idx) => {
                const imgUrl = code === '0' ? `${baseUrl}${current.id}_${mode}0_wider.webp?v=1` : `${baseUrl}${current.id}_${mode}${code}.webp?v=1`;
                const img = document.createElement('img');
                img.src = imgUrl;
                img.className = `w-12 h-12 object-cover border-2 ${idx === imgIdx ? 'border-gold' : 'border-transparent'} cursor-pointer transition`;
                img.onclick = () => { imgIdx = idx; updateMainPhoto(); };
                thumbArea.appendChild(img);
            });
            updateMainPhoto();

            const btn = document.getElementById('awakenBtn');
            if(isAwake) {
                document.body.classList.add('awakened-active');
                btn.innerText = "본성 억제하기";
                btn.style.backgroundColor = "#333";
            } else {
                document.body.classList.remove('awakened-active');
                btn.innerText = "본모습 개방하기";
                btn.style.backgroundColor = "#8b0000";
            }
        }

        function updateMainPhoto() {
            const mode = isAwake ? 'T' : 'N';
            const code = codes[imgIdx];
            const imgUrl = code === '0' ? `${baseUrl}${current.id}_${mode}0_wider.webp?v=1` : `${baseUrl}${current.id}_${mode}${code}.webp?v=1`;
            document.getElementById('mainImg').src = imgUrl;
        }

        function nextImg() { imgIdx = (imgIdx + 1) % 6; updateMainPhoto(); }
        function prevImg() { imgIdx = (imgIdx - 1 + 6) % 6; updateMainPhoto(); }
        function toggleAwakening() { isAwake = !isAwake; imgIdx = 0; updateUI(); }
        function closeModal() { document.getElementById('charModal').classList.add('hidden'); document.body.style.overflow = 'auto'; document.body.classList.remove('awakened-active'); }

        renderGrids();
    </script>
</body>
</html>
