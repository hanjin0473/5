<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHEONGEUN ACADEMY: BIOMETRIC ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --silver: #cbd5e1; --black: #020617; --neon-blue: #38bdf8; --warning: #ef4444; }
        body { background: var(--black); color: var(--silver); font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .filter-btn { color: #64748b; font-size: 11px; font-weight: 700; transition: 0.3s; }
        .filter-btn.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .char-card { position: relative; transition: 0.4s; background: #0f172a; border-radius: 2px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .char-card:hover { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
        .char-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .char-card:hover .char-img { opacity: 1; }
        .awakened-modal { border-color: var(--warning) !important; box-shadow: 0 0 50px rgba(239, 68, 68, 0.2) !important; }
        .glitch { animation: glitch 1.5s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
        .tag { font-size: 9px; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px; color: #94a3b8; }
        .awakened-tag { background: rgba(239, 68, 68, 0.1); color: var(--warning); }
    </style>
</head>
<body class="p-4 md:p-12">

    <header class="max-w-7xl mx-auto mb-10 flex justify-between items-end border-b border-white/10 pb-6">
        <div>
            <h1 class="orbitron text-2xl font-black tracking-tighter text-white">靑銀 ARCHIVE <span class="text-sky-500 text-sm">V3.5</span></h1>
            <p class="text-[9px] text-slate-500 orbitron tracking-widest mt-1">PERSONAL DATA MANAGEMENT SYSTEM</p>
        </div>
        <div class="flex gap-6">
            <button onclick="render('ALL')" class="filter-btn active orbitron" id="btn-ALL">ALL</button>
            <button onclick="render('STUDENT')" class="filter-btn orbitron" id="btn-STUDENT">STUDENT</button>
            <button onclick="render('FACULTY')" class="filter-btn orbitron" id="btn-FACULTY">FACULTY</button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto">
        <div id="characterGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4"></div>
    </div>

    <div id="charModal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm" onclick="closeModal()">
        <div id="idCard" class="glass-panel w-full max-w-[450px] overflow-hidden transition-all duration-500" onclick="event.stopPropagation()">
            
            <div class="relative group" onclick="toggleAwakening()">
                <img id="mImg" src="" class="w-full aspect-[1/1.1] object-cover transition-all duration-700">
                <div id="modeBadge" class="absolute top-4 left-4 px-3 py-1 bg-sky-500 text-black orbitron text-[10px] font-black">NORMAL MODE</div>
                <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] via-transparent to-transparent"></div>
                <div class="absolute bottom-6 left-8">
                    <p id="mSub" class="text-sky-400 text-[10px] font-bold mb-1"></p>
                    <h2 id="mName" class="text-4xl font-bold text-white tracking-tighter"></h2>
                </div>
            </div>

            <div class="p-8 pt-2 space-y-6">
                <div class="grid grid-cols-4 gap-4 text-center border-b border-white/5 pb-4">
                    <div><p class="text-[8px] text-slate-500 orbitron">HEIGHT</p><p id="mHeight" class="text-[11px] text-white font-bold"></p></div>
                    <div><p class="text-[8px] text-slate-500 orbitron">WEIGHT</p><p id="mWeight" class="text-[11px] text-white font-bold"></p></div>
                    <div><p class="text-[8px] text-slate-500 orbitron">LIKES</p><p id="mLikes" class="text-[11px] text-white font-bold truncate"></p></div>
                    <div><p class="text-[8px] text-slate-500 orbitron">DISLIKES</p><p id="mDislikes" class="text-[11px] text-white font-bold truncate"></p></div>
                </div>

                <div class="space-y-4">
                    <div class="flex flex-wrap gap-2" id="mTags"></div>
                    <p id="mQuote" class="text-[13px] text-slate-300 leading-relaxed italic border-l-2 border-sky-500 pl-4"></p>
                    <p id="mDesc" class="text-[11px] text-slate-500 leading-relaxed h-16 overflow-y-auto custom-scroll pr-2"></p>
                </div>

                <div class="pt-4 flex justify-between items-center border-t border-white/5">
                    <div class="text-[9px] orbitron text-slate-600">INTEL_LEVEL: <span id="mLevel" class="text-sky-500">SECURE</span></div>
                    <button onclick="toggleAwakening()" class="orbitron text-[10px] py-2 px-4 border border-white/10 hover:bg-white/5 transition">SYNC INSTINCT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = "https://pub-1ff16a5c9ef048e3ab851e262c07ba57.r2.dev/";
        const characters = [
            {
                name: "서하린", sub: "2학년 / 선도부", height: "168cm", weight: "49kg", likes: "정적, 토마토 주스", dislikes: "무질서, 마늘",
                tags: ["#원칙주의", "#선도부장", "#차가운_미인"], quote: "교칙 위반이야. 그 목덜미의 박동이 멈추기 전에 대답해.",
                desc: "뱀파이어 사생아 출신. 철저한 통제 교육을 받아 인간 사회에 완벽히 적응한 듯 보이나, 밤마다 피어오르는 갈증에 괴로워함.",
                awakened: {
                    sub: "순수혈통 / 포식자", height: "168cm", weight: "47kg", likes: "신선한 혈액, 맥박", dislikes: "햇빛, 은제품",
                    tags: ["#본능폭주", "#혈액지배", "#포식자"], quote: "아... 좋은 냄새. 규칙 같은 건 이제 상관없어. 네 피가 달콤할 것 같거든.",
                    desc: "이성을 잃은 진정한 흡혈귀. 상대를 벽으로 몰아넣고 목덜미의 맥박을 느끼는 순간 가장 고양됨."
                },
                imgs: [baseUrl + "HRN_N0.webp", baseUrl + "HRN_TE1.webp"], cat: "STUDENT"
            },
            {
                name: "차태오", sub: "3학년 / 자율동아리", height: "185cm", weight: "74kg", likes: "체스, 인간의 당황", dislikes: "지루함, 계약 파기",
                tags: ["#능글남", "#문제아", "#계약악마"], quote: "재미있네. 네 영혼, 나한테 팔아볼 생각 없어? 잃을 건 영혼뿐이야.",
                desc: "타인의 반응을 즐기는 악마. 학원 내에서 각종 내기와 거래를 주도하며 판을 흔드는 것을 삶의 낙으로 삼음.",
                awakened: {
                    sub: "지옥의 후계 / 계약자", height: "190cm", weight: "82kg", likes: "영혼의 절망, 복종", dislikes: "신의 권능, 상식",
                    tags: ["#파멸", "#소유욕", "#진정한_악마"], quote: "거래 성립이야. 이제 네 모든 건 내 거야. 도망칠 수 있을 거라 생각했어?",
                    desc: "거대한 위압감을 내뿜는 악마 본연의 모습. 상대를 심리적으로 완전히 굴복시킨 뒤 그 영혼을 탐닉함."
                },
                imgs: [baseUrl + "TAO_N0.webp", baseUrl + "TAO_TB2.webp"], cat: "STUDENT"
            },
            // ... (나머지 캐릭터들도 이 구조에 맞춰 데이터가 동일하게 적용됩니다)
            {
                name: "강도윤", sub: "교직원 / 생활지도부", height: "189cm", weight: "85kg", likes: "질서, 블랙커피", dislikes: "소음, 책임 회피",
                tags: ["#엄격", "#최강자", "#생활지도"], quote: "내 앞에서 오기는 부리지 마라. 질서를 지키는 법부터 배우는 게 좋을 거다.",
                desc: "드래곤 혼혈 교사. 강력한 마력 위압으로 인외 학생들을 한 손에 통제하며 학원의 치안을 책임짐.",
                awakened: {
                    sub: "진홍의 폭룡", height: "200cm↑", weight: "?? kg", likes: "보물, 절대적 복종", dislikes: "도발, 무능",
                    tags: ["#파괴신", "#절대자", "#드래곤"], quote: "네가 감당할 수 없는 힘을 과시하지 마라. 한 줌의 재로 변하기 싫다면.",
                    desc: "드래곤의 오만함이 극에 달한 상태. 눈앞의 모든 것을 불태워버릴 수 있는 파괴적인 마력을 방출함."
                },
                imgs: [baseUrl + "KDY_N0.webp", baseUrl + "KDY_TE1.webp"], cat: "FACULTY"
            }
        ];

        let current = null;
        let isAwake = false;

        function render(f) {
            const g = document.getElementById('characterGrid');
            g.innerHTML = '';
            const filtered = f === 'ALL' ? characters : characters.filter(c => c.cat === f);
            
            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = () => openModal(c);
                card.innerHTML = `
                    <img src="${c.imgs[0]}" class="char-img">
                    <div class="p-3">
                        <p class="text-[11px] font-bold text-white mb-1">${c.name}</p>
                        <p class="text-[8px] text-slate-500 orbitron uppercase">${c.sub.split(' / ')[1] || c.sub}</p>
                    </div>
                `;
                g.appendChild(card);
            });
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${f}`).classList.add('active');
        }

        function openModal(c) {
            current = c; isAwake = false; updateUI();
            document.getElementById('charModal').classList.remove('hidden');
        }

        function toggleAwakening() {
            isAwake = !isAwake;
            const card = document.getElementById('idCard');
            card.style.animation = 'glitch 0.2s ease';
            setTimeout(() => card.style.animation = '', 200);
            updateUI();
        }

        function updateUI() {
            const d = isAwake ? current.awakened : current;
            const badge = document.getElementById('modeBadge');
            
            document.getElementById('mName').innerText = current.name;
            document.getElementById('mSub').innerText = d.sub;
            document.getElementById('mHeight').innerText = d.height;
            document.getElementById('mWeight').innerText = d.weight;
            document.getElementById('mLikes').innerText = d.likes;
            document.getElementById('mDislikes').innerText = d.dislikes;
            document.getElementById('mQuote').innerText = d.quote;
            document.getElementById('mDesc').innerText = d.desc;
            document.getElementById('mImg').src = isAwake ? current.imgs[1] : current.imgs[0];

            const tagContainer = document.getElementById('mTags');
            tagContainer.innerHTML = '';
            d.tags.forEach(t => {
                const span = document.createElement('span');
                span.className = `tag ${isAwake ? 'awakened-tag' : ''}`;
                span.innerText = t;
                tagContainer.appendChild(span);
            });

            if(isAwake) {
                document.getElementById('idCard').classList.add('awakened-modal');
                badge.innerText = "INSTINCT UNLEASHED";
                badge.style.background = 'var(--warning)';
                document.getElementById('mLevel').innerText = "UNRESTRICTED";
                document.getElementById('mLevel').style.color = 'var(--warning)';
                document.getElementById('mQuote').style.borderColor = 'var(--warning)';
            } else {
                document.getElementById('idCard').classList.remove('awakened-modal');
                badge.innerText = "NORMAL MODE";
                badge.style.background = 'var(--neon-blue)';
                document.getElementById('mLevel').innerText = "SECURE";
                document.getElementById('mLevel').style.color = 'var(--neon-blue)';
                document.getElementById('mQuote').style.borderColor = 'var(--neon-blue)';
            }
        }

        function closeModal() { document.getElementById('charModal').classList.add('hidden'); }
        render('ALL');
    </script>
</body>
</html>
