            filtered.forEach(c => {
                const d = document.createElement('div'); d.className = 'sys-card p-2';
                d.onclick = () => openModal(c);
                d.innerHTML = `<div class="card-img-wrap rounded-xl mb-2"><img src="${c.imgs[0]}"></div>
                <p class="text-[10px] font-black text-slate-900">${c.name}</p>
                <p class="text-[8px] text-blue-600 font-bold orbitron uppercase">${c.status}</p>`;
                g.appendChild(d);
            });
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

        }

            document.getElementById('mSpecies').innerText = current.species;
            document.getElementById('mStatus').innerText = d.status;

            document.getElementById('mConflict').innerText = d.conflict;
            document.getElementById('mQuote').innerText = d.quote;
            document.getElementById('mDesc').innerText = d.desc;
