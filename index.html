    <style>
        :root { 
            --gold: #b08d57; --deep-brown: #3d2b1f; 
            --paper: #fdfaf1; --ink: #1a1a1a; --danger-red: #8b0000;
        }
        body { 
            background: #120c09; 
            color: var(--ink); 
            font-family: 'Noto Serif KR', serif; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            line-height: 1.6;
        }
        
        .paper-sheet { 
            background: var(--paper); 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 1px solid #d4c5a9;
        }

        /* 탭 메뉴 슬림화 */
        .tab-btn { 
            padding: 15px 30px; 
            color: #8c7865; 
            font-weight: 700; 
            font-size: 16px; 
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active { color: var(--deep-brown); border-bottom-color: var(--gold); }
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 캐릭터 카드: 내부 상하 공간 확보 및 이미지 거리감 조절 */
        .char-card { 
            border: 1px solid #d4c5a9; 
            background: #fff; 
            padding: 24px 12px; /* 상하 여백 대폭 확대 */
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .char-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .char-card img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-cover: cover;
            object-position: center 20%; /* 이미지의 위쪽을 기준으로 잡아 전신 느낌 강조 */
            margin-bottom: 15px;
        }

        /* 모달 레이아웃 수정: 텍스트 가독성 중심 */
        #modalContainer { max-width: 650px; width: 95%; }
        .main-photo-container {
            height: 450px; /* 너무 크지 않게 조절 */
            background: #000;
            position: relative;
            overflow: hidden;
        }
        .main-photo {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 이미지가 잘리지 않고 멀리서 보이도록 설정 */
        }

        /* 각성 연출: 프로필 일렁임 */
        .awakened-active .info-area { 
            background-color: #050505 !important; 
            color: #d1d1d1 !important;
            background-image: linear-gradient(110deg, #050505 45%, #151515 50%, #050505 55%);
            background-size: 200% 100%;
            animation: shimmer 4s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .category-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--deep-brown);
            border-left: 5px solid var(--gold);
            padding-left: 15px;
            margin: 40px 0 20px 0;
        }

        .tag-item {
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: 700;
            background: rgba(176, 141, 87, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 4px;
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(176, 141, 87, 0.2); }

                    <img src="${baseUrl}${c.id}_N0_wider.webp">
                    <p class="text-center font-black text-lg text-[#3d2b1f] mb-1">${c.name}</p>
                    <p class="text-center text-[10px] text-[#b08d57] font-bold uppercase tracking-tighter">${c.sub.split(' / ')[0]}</p>
                `;
                if(c.type === 'staff') staffG.appendChild(card);
                else studentG.appendChild(card);
            });
        }

        function openModal(c) {
            current = c; isAwake = false; imgIdx = 0;
            document.getElementById('charModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            updateUI();
        }

        function updateUI() {
            const data = isAwake ? current.awakened : current;
            const mode = isAwake ? 'T' : 'N';
            
            document.getElementById('mName').innerText = current.name;
            document.getElementById('mSubTitle').innerText = data.sub;
            document.getElementById('mHeight').innerText = current.height;
            document.getElementById('mWeight').innerText = current.weight;
            document.getElementById('mQuote').innerText = data.quote;
            document.getElementById('mDesc').innerText = data.desc;

            const tagArea = document.getElementById('mTags');
            tagArea.innerHTML = '';
            data.tags.forEach(t => {
                const s = document.createElement('span');
                s.className = 'tag-item';
                s.innerText = t;
                tagArea.appendChild(s);
            });

            const thumbArea = document.getElementById('thumbArea');
            thumbArea.innerHTML = '';
            codes.forEach((code, idx) => {
                // 0번일 때 _wider를 붙이는 경로 로직 보완
                const imgName = code === "0" ? `${current.id}_${mode}0_wider.webp` : `${current.id}_${mode}${code}.webp`;
                const img = document.createElement('img');
                img.src = baseUrl + imgName;
                img.className = `w-10 h-10 object-cover border-2 ${idx === imgIdx ? 'border-gold' : 'border-transparent'} cursor-pointer`;
                img.onclick = () => { imgIdx = idx; updateMainPhoto(); };
                thumbArea.appendChild(img);
            });
            updateMainPhoto();

            const btn = document.getElementById('awakenBtn');
            if(isAwake) {
                document.body.classList.add('awakened-active');
                btn.innerText = "본성 억제하기";
                btn.style.backgroundColor = "#333";
            } else {
                document.body.classList.remove('awakened-active');
                btn.innerText = "본모습 개방하기";
                btn.style.backgroundColor = "#8b0000";
            }
        }

        function updateMainPhoto() {
            const mode = isAwake ? 'T' : 'N';
            const code = codes[imgIdx];
            const imgName = code === "0" ? `${current.id}_${mode}0_wider.webp` : `${current.id}_${mode}${code}.webp`;
            document.getElementById('mainImg').src = baseUrl + imgName;
            
            document.querySelectorAll('#thumbArea img').forEach((t, i) => {
                t.style.borderColor = i === imgIdx ? (isAwake ? 'red' : 'var(--gold)') : 'transparent';
            });
        }

        function nextImg() { imgIdx = (imgIdx + 1) % codes.length; updateMainPhoto(); }
        function prevImg() { imgIdx = (imgIdx - 1 + codes.length) % codes.length; updateMainPhoto(); }
        function toggleAwakening() { isAwake = !isAwake; imgIdx = 0; updateUI(); }
        function closeModal() { document.getElementById('charModal').classList.add('hidden'); document.body.style.overflow = 'auto'; document.body.classList.remove('awakened-active'); }

        renderGrids();
    </script>
</body>
</html>
